name: Melody4U Facebook Autopost

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run autopost scheduler
        env:
          META_PAGE_ID: ${{ secrets.META_PAGE_ID }}
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          DEFAULT_TIMEZONE: ${{ secrets.DEFAULT_TIMEZONE }}
        run: python -m src.main

      - name: Commit updated post statuses
        run: |
          if git diff --quiet -- data/posts.json; then
            echo "No status changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/posts.json
          git commit -m "chore: update autopost statuses [skip ci]"
          git push
